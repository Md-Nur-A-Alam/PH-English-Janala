<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eng Janala</title>
    <link rel="shortcut icon" href="./assets/logo.png" type="image/x-icon">
    <!-- daisy UI -->
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />

    <!-- font awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
        integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />

    <!-- google font -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Hind+Siliguri:wght@300;400;500;600;700&family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
        rel="stylesheet">
    <!-- css link -->
    <link rel="stylesheet" href="./style/style.css">

</head>

<body>
    <header>
        <!-- =========== Navbar =========== -->
        <nav class="w-full">
            <div class="navbar bg-base-100 shadow-sm">
                <div class="navbar-start ml-0 md:ml-8">
                    <div class="dropdown">
                        <div tabindex="0" role="button" class="btn btn-ghost sm:hidden">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24"
                                stroke="currentColor">
                                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                                    d="M4 6h16M4 12h8m-8 6h16" />
                            </svg>
                        </div>
                        <ul tabindex="-1"
                            class="menu menu-sm dropdown-content bg-base-100 rounded-box z-1 mt-3 w-52 p-2 shadow">
                            <li><a href="#">FAQ</a></li>
                            <li><a href="#">Learn</a></li>
                            <li><a href="#">Logout</a></li>
                        </ul>
                    </div>
                    <a class="btn btn-ghost text-xl font-bold">English<img src="./assets/logo.png" alt=""><span
                            class="bangla"> জানালা</span></a>
                </div>
                <div class="navbar-end hidden sm:flex mr-0 md:mr-8">
                    <ul class="menu menu-horizontal px-1">
                        <a href="#" class="btn btn-primary btn-outline mx-1 text-[10px] md:text-[12px]"><i
                                class="fa-solid fa-circle-question"></i>
                            FAQ</a>
                        <a href="#" class="btn btn-primary btn-outline mx-1 text-[10px] md:text-[12px]"><i
                                class="fa-brands fa-leanpub"></i> Learn</a>
                        <a href="#" class="btn btn-primary btn-outline mx-1 text-[10px] md:text-[12px]"><i
                                class="fa-solid fa-arrow-right-from-bracket"></i>Logout</a>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- =========== Hero section =========== -->
        <div id="hero">
            <div class="hero bg-base-200 min-h-screen">
                <div class="hero-content flex-col lg:flex-row-reverse">
                    <img src="./assets/hero-student.png" class="max-w-lg" />
                    <div>
                        <h1 class="text-5xl font-bold"><span class="text-[#00BCFF]">English</span> is Easy!!</h1>
                        <p class="py-6 max-w-[55%]">
                            আজ থেকেই আপনার ভাষা শেখার যাত্রা শুরু করুন। আপনি যদি নতুন হন অথবা আপনার দক্ষতা বাড়াতে চান,
                            আমাদের Interactive Lessons আপনাকে নিয়ে যাবে অন্য একটি Level এ
                        </p>
                        <fieldset class="fieldset [&>*]:mb-2">
                            <input type="text" class="input" placeholder="Enter Your Name" />
                            <input type="password" class="input" placeholder="Enter Your Password" />
                        </fieldset>
                        <button class="btn btn-primary">Get Started</button>
                    </div>
                </div>
            </div>
        </div>
    </header>
</body>

</html>
